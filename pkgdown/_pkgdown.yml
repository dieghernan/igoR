url: https://dieghernan.github.io/igoR

figures:
  dpi: 300
  fig.retina: 2

development:
  mode: auto

repo:
  branch: main

template:
  bootstrap: 5
  package: gitdevr
  params:
    ganalytics: G-S61Y539QDX

home:
  title: igoR | R package for intergovernmental organizations
  description: >
    Tools for searching, extracting and recoding information from the
    Intergovernmental Organizations Database (v3), distributed by the
    Correlates of War Project. Includes IGO-year, state-year and joint
    membership data.

reference:
- title: Data sets
  desc: IGO-year, state-year and state system membership data.
  contents:
  - igo_year_format3
  - state_year_format3
  - states2016
- title: Query and extraction functions
  desc: Search IGOs and states, then extract membership and joint membership information.
  contents:
  - igo_search
  - igo_search_states
  - igo_members
  - igo_state_membership
  - igo_dyadic
- title: Recode helpers
  desc: Convert numerical membership status codes into factor labels.
  contents:
  - starts_with("igo_recode")
- title: About the package
  contents:
  - igoR-package

articles:
- title: Articles and annexes
  navbar: Articles
  contents:
  - mapping
  - articles/list-igos

authors:
  Diego Hernangómez:
    href: https://dieghernan.github.io/
  The Correlates of War Project:
    href: https://correlatesofwar.org/
    html: >
      <img
      src='https://correlatesofwar.org/wp-content/uploads/cropped-COW-logo-2025-base-1-300x101.png'
      width='50' alt='The Correlates of War Project' class='align-middle'>
