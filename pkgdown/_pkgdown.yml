url: https://dieghernan.github.io/igoR

figures:
  dpi: 300
  fig.retina: 2

development:
  mode: auto

repo:
  branch: main

template:
  bootstrap: 5
  package: gitdevr
  params:
    ganalytics: G-S61Y539QDX

home:
  title: igoR | R package for intergovernmental organizations
  description: >
    Tools for searching, extracting and recoding information from the
    Intergovernmental Organizations Database (v3), distributed by the
    Correlates of War Project. Includes IGO-year and country-year data, state
    system data and helpers for dyad-year joint membership results.

reference:
- title: Data sets
  desc: IGO-year, country-year and state system data.
- contents:
  - has_concept("data sets")
- title: Query functions
  desc: Search IGOs and states.
- contents:
  - has_concept("query functions")
- title: Membership functions
  desc: >
    Extract IGO memberships and dyad-year joint membership results.
- contents:
  - has_concept("membership functions")
- title: Recode helpers
  desc: Convert numerical membership status codes into factor labels.
- contents:
  - has_concept("recode helpers")
- title: About the package
- contents:
  - igoR-package

articles:
- title: Applied articles
  desc: Examples that use IGO membership data in applied workflows.
  navbar: Articles
  contents:
  - mapping
- title: Annexes
  desc: Interactive reference tables for available IGOs and COW states.
  navbar: Annexes
  contents:
  - articles/list-igos

authors:
  Diego Hernangómez:
    href: https://dieghernan.github.io/
  The Correlates of War Project:
    href: https://correlatesofwar.org/
    html: >
      <img
      src='https://correlatesofwar.org/wp-content/uploads/cropped-COW-logo-2025-base-1-300x101.png'
      width='50' alt='The Correlates of War Project' class='align-middle'>
