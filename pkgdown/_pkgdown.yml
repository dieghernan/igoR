url: https://dieghernan.github.io/igoR

figures:
  dpi: 300
  fig.retina: 2

development:
  mode: auto

repo:
  branch: main

template:
  bootstrap: 5
  package: gitdevr
  params:
    ganalytics: G-S61Y539QDX

home:
  title: igoR | Intergovernmental organization data in R
  description: >
    Tools for searching, extracting and recoding the Intergovernmental
    Organizations Database (version 3), distributed by the Correlates of War
    Project. Includes IGO-year and country-year membership data, state system
    data and functions for deriving dyad-year joint membership results.

reference:
- title: Data sets
  desc: Data included with igoR for IGO, country and state system analysis.
- contents:
  - has_concept("data sets")

- title: Query functions
  desc: Search IGO metadata and resolve state names, abbreviations and codes.
- contents:
  - has_concept("query functions")

- title: Membership functions
  desc: >
    Extract state-IGO membership records and derive dyad-year joint
    memberships.
- contents:
  - has_concept("membership functions")

- title: Recode helpers
  desc: Convert numerical membership codes to labelled factors.
- contents:
  - has_concept("recode helpers")

- title: About the package
  desc: Package overview, authors and links.
- contents:
  - igoR-package

articles:
- title: Get started
  desc: Introduction to the data and the main igoR workflows.
  navbar: ~
  contents:
  - igoR
- title: Workflows
  desc: Applied examples using IGO membership data.
  navbar: Workflows
  contents:
  - mapping
- title: Data reference
  desc: >
    Interactive reference tables for available IGOs and states in the
    Correlates of War state system.
  navbar: Data
  contents:
  - articles/list-igos

authors:
  Diego Hernangómez:
    href: https://dieghernan.github.io/
  The Correlates of War Project:
    href: https://correlatesofwar.org/
    html: >
      <img
      src='https://correlatesofwar.org/wp-content/uploads/cropped-COW-logo-2025-base-1-300x101.png'
      width='50' alt='The Correlates of War Project' class='align-middle'>
