url: https://dieghernan.github.io/igoR

figures:
  dpi: 300
  fig.retina: 2

development:
  mode: auto

repo:
  branch: main

template:
  bootstrap: 5
  package: gitdevr
  params:
    ganalytics: G-S61Y539QDX

home:
  title: igoR | R package for Intergovernmental Organizations (IGOs)
  description: >
    This package provides access to and extracts information from the
    Intergovernmental Organizations Database (v3), provided by the
    Correlates of War Project.

reference:
- title: Data sets
  desc: Data objects included in the package.
  contents:
  - igo_year_format3
  - state_year_format3
  - states2016
- title: Query and extraction functions
  desc: Functions to search IGOs and extract membership information.
  contents:
  - igo_dyadic
  - igo_members
  - igo_search
  - igo_search_states
  - igo_state_membership
- title: Recode helpers
  desc: Helpers to convert numerical membership codes into factors.
  contents:
  - starts_with("igo_recode")
- title: About the package
  contents:
  - igoR-package

articles:
- title: Articles
  navbar: Articles
  contents:
  - mapping
  - articles/list-igos

authors:
  Diego Hernangómez:
    href: https://dieghernan.github.io/
  The Correlates of War Project:
    href: https://correlatesofwar.org/
    html: >
      <img
      src='https://correlatesofwar.org/wp-content/uploads/cropped-COW-logo-2025-base-1-300x101.png'
      width='50' alt='The Correlates of War Project' class='align-middle'>
